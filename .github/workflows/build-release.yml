name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  APP_DIR: packages/app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_android_release:
    runs-on: ubuntu-latest
    env:
      HAS_ANDROID_SIGNING: ${{ secrets.KEYSTORE_BASE64 != '' && secrets.KEYSTORE_PASSWORD != '' && secrets.KEY_PASSWORD != '' && secrets.KEY_ALIAS != '' }}
    defaults:
      run:
        working-directory: packages/app

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Skip Android release build when signing secrets are unavailable
        if: ${{ env.HAS_ANDROID_SIGNING != 'true' }}
        run: echo "Android signing secrets are unavailable; skipping Android release artifacts."

      - name: Decode Keystore
        if: ${{ env.HAS_ANDROID_SIGNING == 'true' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        if: ${{ env.HAS_ANDROID_SIGNING == 'true' }}
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK
        if: ${{ env.HAS_ANDROID_SIGNING == 'true' }}
        run: flutter build apk --release

      - name: Archive APK
        if: ${{ env.HAS_ANDROID_SIGNING == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: release-apk
          path: ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/app-release.apk

      - name: Build release AAB
        if: ${{ env.HAS_ANDROID_SIGNING == 'true' }}
        run: flutter build appbundle --release

      - name: Archive AAB
        if: ${{ env.HAS_ANDROID_SIGNING == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: release-aab
          path: ${{ env.APP_DIR }}/build/app/outputs/bundle/release/app-release.aab

  build_linux_release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/app

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake curl git ninja-build pkg-config zip libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Linux Flutter Desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux portable ZIP
        run: |
          mkdir -p "$GITHUB_WORKSPACE/$APP_DIR/build"
          cd build/linux/x64/release
          zip -r "$GITHUB_WORKSPACE/$APP_DIR/build/bot_creator-linux-x64-portable.zip" bundle

      - name: Archive Linux ZIP
        uses: actions/upload-artifact@v6
        with:
          name: linux-portable-zip
          path: ${{ env.APP_DIR }}/build/bot_creator-linux-x64-portable.zip

      - name: Build Linux AppImage
        run: bash packaging/linux/appimage/build_appimage.sh

      - name: Archive AppImage
        uses: actions/upload-artifact@v6
        with:
          name: linux-appimage
          path: ${{ env.APP_DIR }}/build/appimage/bot_creator-linux-x86_64.AppImage

  build_windows_release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: packages/app

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Windows Flutter Desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/bot_creator-windows-x64-portable.zip -Force

      - name: Archive Windows ZIP
        uses: actions/upload-artifact@v6
        with:
          name: windows-portable-zip
          path: ${{ env.APP_DIR }}/build/bot_creator-windows-x64-portable.zip

      - name: Archive Windows EXE
        uses: actions/upload-artifact@v6
        with:
          name: windows-exe
          path: ${{ env.APP_DIR }}/build/windows/x64/runner/Release/*.exe

      - name: Set Store-compatible MSIX version
        shell: pwsh
        run: |
          $pubspec = 'pubspec.yaml'
          $content = Get-Content -Raw $pubspec
          $versionMatch = [regex]::Match($content, '(?m)^version:\s*([0-9]+)\.([0-9]+)\.([0-9]+)\+[0-9]+\s*$')
          if (-not $versionMatch.Success) {
            throw 'Unable to parse app version from pubspec.yaml'
          }
          $msixVersion = "$($versionMatch.Groups[1].Value).$($versionMatch.Groups[2].Value).$($versionMatch.Groups[3].Value).0"
          $updated = [regex]::Replace($content, '(?m)^\s*msix_version:\s*[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\s*$', "  msix_version: $msixVersion")
          if ($updated -eq $content) {
            throw 'Unable to update msix_version in pubspec.yaml'
          }
          Set-Content -Path $pubspec -Value $updated -NoNewline
          Write-Host "MSIX version set to $msixVersion"

      - name: Create MSIX package
        run: dart run msix:create

      - name: Archive Windows MSIX
        uses: actions/upload-artifact@v6
        with:
          name: windows-msix
          path: ${{ env.APP_DIR }}/build/windows/x64/runner/Release/*.msix

  create_release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: [build_android_release, build_linux_release, build_windows_release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Collect existing release assets
        id: release_assets
        shell: bash
        run: |
          shopt -s nullglob
          files=()
          patterns=(
            "release-apk/app-release.apk"
            "release-aab/app-release.aab"
            "linux-portable-zip/bot_creator-linux-x64-portable.zip"
            "linux-appimage/*.AppImage"
            "windows-portable-zip/bot_creator-windows-x64-portable.zip"
            "windows-msix/*.msix"
          )

          for pattern in "${patterns[@]}"; do
            for file in $pattern; do
              if [ -f "$file" ]; then
                files+=("$file")
              fi
            done
          done

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: false
          files: ${{ steps.release_assets.outputs.files }}
