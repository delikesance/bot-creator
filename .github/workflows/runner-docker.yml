name: Runner Docker

on:
  pull_request:
    branches: ["master", "main"]
    paths:
      - "Dockerfile"
      - "pubspec.yaml"
      - "packages/runner/**"
      - "packages/shared/**"
      - ".github/workflows/runner-docker.yml"
  push:
    branches: ["master", "main"]
    tags:
      - "v*"
      - "runner-v*"
    paths:
      - "Dockerfile"
      - "pubspec.yaml"
      - "packages/runner/**"
      - "packages/shared/**"
      - ".github/workflows/runner-docker.yml"
  workflow_dispatch:
    inputs:
      publish:
        description: "Push image to GHCR"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bot-creator-runner
  SMOKE_PLATFORM: linux/amd64
  PUBLISH_PLATFORMS: linux/amd64,linux/arm64
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_smoke:
    name: Build & smoke test image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image (AOT Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: bot-creator-runner:ci
          platforms: ${{ env.SMOKE_PLATFORM }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test /health endpoint
        run: |
          set -euo pipefail
          docker run -d --rm --name bot-creator-runner-ci -p 18080:8080 bot-creator-runner:ci
          trap 'docker rm -f bot-creator-runner-ci >/dev/null 2>&1 || true' EXIT

          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:18080/health >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:18080/health

  publish:
    name: Publish image to GHCR
    needs: build_and_smoke
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.PUBLISH_PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
