name: CI Tests

on:
  pull_request:
    branches: ["master", "main"]
  push:
    branches: ["master", "main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.2"
          channel: "stable"
          cache: true

      - name: Install workspace dependencies
        run: flutter pub get

      - name: Analyze shared package
        run: dart analyze packages/shared

      - name: Analyze runner package
        run: dart analyze packages/runner

      - name: Analyze app package
        run: flutter analyze packages/app

      - name: Run app tests
        run: flutter test packages/app/test --reporter expanded

      - name: Run shared tests
        run: dart test packages/shared/test

      - name: Run runner tests
        run: dart test packages/runner/test
